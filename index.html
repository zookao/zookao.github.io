<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World | My GitHub Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            padding: 40px 24px;
        }

        h1 {
            font-size: clamp(2rem, 10vw, 64px);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
            color: #111;
        }

        p.subtitle {
            font-size: 18px;
            opacity: 0.75;
            margin-bottom: 32px;
        }

        .emoji {
            font-size: 48px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        hr {
            width: 80px;
            height: 2px;
            background-color: rgba(51, 153, 255, 25%);
            border: none;
            margin: 36px auto;
        }

        .links a {
            display: inline-block;
            margin: 0 14px;
            padding: 13px 26px;
            border-radius: 999px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.22s ease;
            border: 1px solid transparent;
        }

        .primary-btn {
            background-color: #007acc;
            color: white;
        }

        .outline-btn {
            border-color: #ccc;
            color: #444;
        }

        .primary-btn:hover { background-color: #006bbd; }
        .outline-btn:hover { border-color: #888; background-color: rgba(0,0,0,.03); }

        @media (max-width: 480px) {
            .container { padding-top: 60px; }
            .links a { margin: 6px 10px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="emoji">👋</div>
        <h1>Hello World</h1>
        <p class="subtitle">Welcome to my GitHub Pages site.</p>
        <hr />
        <div class="links">
            <a href="/about" class="primary-btn">About Me</a>
            <a href="https://github.com/YOUR_USERNAME" class="outline-btn">View GitHub</a>
        </div>
    </div>
</body>
</html>
